<app-search></app-search>

<div class="header-2">
  <ul>
    
    <li>
      <a (click)="selectedCategory = null; products = productService.getAll()" 
         [class.active]="selectedCategory === null">
        ВСЕ КАТЕГОРИИ
      </a>
    </li>

 
    <li *ngFor="let cat of categories">
      <a (click)="selectCategory(cat)"
         [class.active]="selectedCategory?.id === cat.id">
        {{ cat.name }}
      </a>
    </li>
  </ul>
</div>


<ul>
  <li *ngFor="let p of products">
    <div class="main">
      <img src="{{p.image}}">
      <div class="content">
        <div class="name">
            {{ p.name }}
            <button (click)="p.likes = p.likes + 1"
            [style.color]="p.likes>=20 ? 'red' : 'black'">❤ {{ p.likes }}
        </button>
            <button (click)="deleteProduct(p.id)">🗑</button>
        </div>
        <div class="stars">
          <span *ngFor="let star of [1,2,3,4,5]"
                [class.active]="star <= p.rating">★</span>
        <span class="rating-number" 
            [style.color]="p.rating>4 ? 'green' : 'red'">({{p.rating}})
        </span>
        </div>
        <div class="item-footer">
          <div class="desc">
            <a href="{{ p.link }}" class="link"><span>{{ p.description }}</span></a>
          </div>
          <div class="price">
            <span>{{ p.price }} KZT</span>
          </div>
        </div>
        <div class="social-btns">
          <a href="https://t.me/mapyraq" target="_blank" class="tg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
          </a>
          <a href="https://wa.me/77472929651" target="_blank" class="wts">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
          </a>
        </div>

        


      </div>
    </div>
  </li>
</ul>
